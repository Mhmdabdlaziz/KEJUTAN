<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    color:white;
}

h1{
    font-size:50px;
    margin-bottom:20px;
}

p{
    font-size:22px;
    margin-bottom:30px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d6d;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
}

#surprise{
    display:none;
    animation:fade 1s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

img{
    width:220px;
    border-radius:20px;
    margin:20px 0;
    box-shadow:0 0 20px rgba(255,255,255,.5);
}

.heart{
    position:absolute;
    color:red;
    font-size:25px;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>

</head>

<body>

<div class="container">

<div id="awal">
<h1>🎂 Hai Sayanggg ❤️</h1>
<p>Tonjong  punya kejutan spesial buat Ratna...</p>

<button onclick="bukaKejutan()">
Buka Kejutan 🎁
</button>
</div>

<div id="surprise">
<h1>🎉 Happy Birthday Sayangggkuuu! 🎉</h1>

<img src="ratna.html" alt="Birthday">

<p id="typing"></p>

<h2 style="margin-top:20px;">❤️ I Love You More Sayanggg ❤️</h2>

</div>

</div>

<script>

const pesan =
"Tonjong bersyukur karena Tonjong udh dipertemukan sama cewe sebaik Ratna. Semoga di umur yang baru, semua impian Ratna tercapai, selalu sehat, selalu bahagia, dan semoga Tonjong bisa terus menemani setiap langkah Ratna. Makasi banyak udah jadi bagian terindah di hidup Tonjong. Selamat ulang tahun cintakuuu. ❤️";

function bukaKejutan(){

document.getElementById("awal").style.display="none";
document.getElementById("surprise").style.display="block";

ketikPesan();

buatHati();

}

function ketikPesan(){

let i=0;

const speed=45;

const tulis=setInterval(()=>{

document.getElementById("typing").innerHTML += pesan.charAt(i);

i++;

if(i>=pesan.length){

clearInterval(tulis);

}

},speed);

}

function buatHati(){

setInterval(()=>{

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(3+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},7000);

},250);

}

</script>

</body>
</html>
